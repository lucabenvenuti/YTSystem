name: YT Summarizer
on:
  schedule:
    - cron: '0 */6 * * *' # Ogni 6 ore
  workflow_dispatch: # Permette l'avvio manuale

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions: # Permessi aggiuntivi per sicurezza
      contents: write
    steps:
      - uses: actions/checkout@v4 # Versione aggiornata
      - name: Setup Python
        uses: actions/setup-python@v5 # Versione aggiornata
        with:
          python-version: '3.9'
      - name: Deps
        run: pip install -r requirements.txt
      - name: Run
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MAILJET_API_KEY: ${{ secrets.MAILJET_API_KEY }}
          MAILJET_SECRET_KEY: ${{ secrets.MAILJET_SECRET_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        run: python script.py
      - name: Save DB
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add processed_videos.json
          git commit -m "Update DB: processed videos" || exit 0
          git push
